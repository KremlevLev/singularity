training:
  phase: sft
  batch_size: 8
  seq_len: 16384
  max_steps: 100000
  gradient_accumulation_steps: 1
  dtype: bfloat16
  remat: true
  optimizer:
    lr: 1.5e-4
    weight_decay: 0.1
    warmup_steps: 2000
    max_grad_norm: 1.0
  checkpoint:
    every_steps: 1000
    keep_last: 3
    async_upload: false

sharding:
  mesh_shape: [1, 8, 1]
  mesh_axes: ["data", "tensor", "expert"]

data:
  train_parquet: null
  validation_parquet: null
  tokenizer: tiktoken
  num_workers: 4
